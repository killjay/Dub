services:
  postgres:
    image: postgres:16-alpine
    container_name: dubkaroo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dubkaroo
      POSTGRES_PASSWORD: dubkaroo
      POSTGRES_DB: dubkaroo
    ports:
      - "5433:5432"
    volumes:
      - dubkaroo-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dubkaroo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dubkaroo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dubkaroo-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dubkaroo-postgres:
  dubkaroo-redis:
